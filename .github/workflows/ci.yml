name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff
      - name: Lint Python
        run: |
          ruff check bench.py --select E,F,W --ignore E501

  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate bench.py syntax
        run: |
          python -m py_compile bench.py
          echo "bench.py parses cleanly."
      - name: Validate JSON schema
        run: |
          python -c "
          import json
          with open('schemas/bench-result.schema.json') as f:
              s = json.load(f)
          assert s.get('$schema', '').startswith('https://json-schema.org/'), 'Not a JSON Schema document'
          assert s['type'] == 'object', 'Schema root is not an object'
          for req in ('schema_version', 'run_id', 'node', 'service', 'corpus', 'profile', 'command', 'metrics'):
              assert req in s['required'], f'Schema missing required field: {req}'
          print('JSON schema valid.')
          "
      - name: Validate checked-in corpus
        run: |
          PROMPTS=$(ls corpora/uttera-tts-40w/prompt_*.txt 2>/dev/null | wc -l)
          echo "TTS prompts: $PROMPTS"
          test "$PROMPTS" -eq 40 || { echo "Expected 40 prompt files in corpora/uttera-tts-40w/"; exit 1; }
          echo "Corpus uttera-tts-40w OK."
      - name: Validate every result JSON against the schema
        run: |
          pip install jsonschema
          python -c "
          import json, glob
          schema = json.load(open('schemas/bench-result.schema.json'))
          from jsonschema import Draft202012Validator
          v = Draft202012Validator(schema)
          files = sorted(glob.glob('results/*/vllm-*.json') + glob.glob('results/*/hotcold-*.json'))
          assert files, 'No result JSONs found under results/'
          bad = []
          for f in files:
              doc = json.load(open(f))
              errs = list(v.iter_errors(doc))
              if errs:
                  bad.append((f, [e.message for e in errs[:3]]))
          if bad:
              for f, msgs in bad:
                  print(f'{f}:')
                  for m in msgs: print(f'  {m}')
              raise SystemExit(f'{len(bad)}/{len(files)} result files failed schema validation.')
          print(f'{len(files)}/{len(files)} result files validate.')
          "
